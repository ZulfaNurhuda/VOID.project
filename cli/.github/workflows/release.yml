name: Release CLI

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: void
            asset_name: void-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: void
            asset_name: void-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: void
            asset_name: void-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: void.exe
            asset_name: void-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: cli
      - uses: softprops/action-gh-release@v1
        with:
          files: cli/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          name: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
