version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/queries/"
    schema:  "migrations/"
    gen:
      go:
        package:                      "repository"
        out:                          "internal/repository"
        emit_json_tags:               true
        emit_db_tags:                 true
        emit_interface:               true
        emit_prepared_queries:        false
        emit_exact_table_names:       false
        emit_empty_slices:            true
        emit_pointers_for_null_types: true
        query_parameter_limit:        5
        sql_package:                  "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
